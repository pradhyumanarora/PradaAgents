version: "3.9"

services:
  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pradaagent-backend
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.3-chat}
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - MCP_SERVERS_CONFIG=/app/mcp_servers.yaml
    volumes:
      # Persist MCP config edits across restarts
      - ./mcp_servers.yaml:/app/mcp_servers.yaml
    restart: unless-stopped

  # ---- Frontend (React + Nginx) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pradaagent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
